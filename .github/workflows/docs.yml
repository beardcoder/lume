name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  check_pages:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.pages_check.outputs.enabled }}
    steps:
      - id: pages_check
        uses: actions/github-script@v9
        with:
          script: |
            try {
              await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.setOutput("enabled", "true");
            } catch (error) {
              if (error.status === 404) {
                core.info("GitHub Pages is not enabled for this repository. Skipping.");
                core.setOutput("enabled", "false");
                return;
              }
              throw error;
            }

  build:
    needs: check_pages
    if: ${{ needs.check_pages.outputs.enabled == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dist

  deploy:
    needs: [check_pages, build]
    if: ${{ needs.check_pages.outputs.enabled == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
