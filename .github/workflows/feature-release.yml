name: Feature Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level"
        required: true
        default: "minor"
        type: choice
        options:
          - minor
          - major
      dry-run:
        description: "Run without publishing, tagging, or pushing"
        required: false
        default: false
        type: boolean

concurrency:
  group: feature-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    name: Bump ${{ inputs.bump }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: v${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify (typecheck, lint, test, build)
        run: bun run check

      - name: Ensure a ${{ inputs.bump }} changeset exists
        run: |
          mkdir -p .changeset
          cat > .changeset/feature-release.md <<EOF
          ---
          "@beardcoder/lume": ${{ inputs.bump }}
          ---

          ${{ inputs.bump == 'major' && 'Major release.' || 'Feature release.' }}
          EOF

      - name: Apply version bump
        run: bun run version

      - name: Read new version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Commit, tag & push
        if: ${{ !inputs.dry-run }}
        run: |
          git add -A
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Dry-run summary
        if: ${{ inputs.dry-run }}
        run: |
          echo "Dry run complete. Computed version: ${{ steps.version.outputs.version }}"
          echo "No commit, tag, push, or publish was performed."

  release:
    needs: bump
    if: ${{ !inputs.dry-run }}
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.bump.outputs.tag }}
    secrets: inherit
    permissions:
      contents: write
      id-token: write
