<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lume – Toast Example</title>
  <style>
    .toast-container { position: fixed; bottom: 1rem; right: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast { background: #333; color: #fff; padding: 0.75rem 1rem; border-radius: 4px; display: flex; align-items: center; gap: 1rem; }
  </style>
</head>
<body>
  <div data-lume="toast" data-lume-id="toaster" class="toast-container">
    <template data-lume-part="item">
      <div class="toast" role="status">
        <span data-lume-part="message"></span>
        <button type="button" data-lume-part="close">Close</button>
      </div>
    </template>
  </div>

  <button id="trigger">Show Toast</button>

  <script type="module">
    import { createLume, defineComponent } from "../../src/index.ts";

    const toast = defineComponent(({ root, template, on, cleanup }) => {
      const createItem = template("item");

      function show(message) {
        const frag = createItem();
        const item = frag.querySelector(".toast");
        const msgEl = frag.querySelector("[data-lume-part='message']");
        const closeBtn = frag.querySelector("[data-lume-part='close']");
        msgEl.textContent = message;
        closeBtn.addEventListener("click", () => item.remove());
        root.appendChild(frag);
      }

      return { show };
    });

    const app = createLume();
    app.component("toast", toast).mount();

    const toaster = app.require("toaster");
    document.getElementById("trigger").addEventListener("click", () => {
      toaster.show("Hello from Lume!");
    });
  </script>
</body>
</html>
